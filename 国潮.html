<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>古月·国潮风门头提示词生成器</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:"Microsoft YaHei",sans-serif;}
body{background: linear-gradient(135deg, #1C0A1C 0%, #3A0E3A 100%); min-height:100vh; padding:20px 0 60px; color:#fff;}
.header{width:100%; background:linear-gradient(90deg, #E63946, #FF5D6D); text-align:center; padding:40px 20px; margin-bottom:30px; border-radius:0 0 16px 16px;}
.input-wrap{max-width:800px;margin:0 auto 30px;background:#fff;padding:30px;border-radius:16px;color:#1F2937;}
.label{font-size:16px;font-weight:500;margin-bottom:10px;}
.input-box, select{width:100%;padding:15px;font-size:16px;border:1px solid #ddd;border-radius:8px;margin-bottom:20px;}
.gen-btn{width:100%;padding:16px;background:#E63946;color:#fff;border:none;border-radius:8px;font-size:17px;cursor:pointer;}
.gen-btn:disabled{background:#FFC2D1;}
.result-wrap{max-width:800px;margin:0 auto;padding:0 20px;}
.result-item{background:#fff;padding:20px;border-radius:12px;margin-bottom:12px;border-left:4px solid #E63946;color:#333;display:flex;justify-content:space-between;gap:10px;}
.item-text{flex:1;font-size:14px;line-height:1.6;}
.copy-btn{padding:8px 12px;background:#E63946;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;}
.copy-btn.copied{background:#ccc;color:#666;}
.copy-all-btn,.download-btn{display:block;margin:20px auto 0;padding:12px 24px;background:#E63946;color:#fff;border:none;border-radius:8px;cursor:pointer;}
.download-btn{margin-top:10px;}
</style>
</head>

<body>

<div class="header">
  <h1>🌙 古月·国潮风门头提示词生成器</h1>
  <p>夜晚效果｜异形门头｜字体多版本｜8K写实</p>
</div>

<div class="input-wrap">
  <div class="label">请输入店铺行业类型</div>
  <input type="text" class="input-box" id="industryInput" placeholder="例如：国潮茶饮、新中式餐饮、文创周边">

  <div class="label">请选择时间效果</div>
  <select id="timeSelect">
    <option value="夜晚" selected>夜晚</option>
    <option value="白天">白天</option>
  </select>

  <div class="label">请选择门头造型</div>
  <select id="shapeSelect">
    <option>波浪异形门头</option>
    <option>圆弧造型门头</option>
    <option>折角异形门头</option>
    <option>多边形造型门头</option>
    <option>立体浮雕门头</option>
    <option>悬挑异形门头</option>
    <option>斜切造型门头</option>
    <option>拱形门头</option>
    <option>悬浮立体门头</option>
    <option>雕花异形门头</option>
  </select>

  <button class="gen-btn" id="genBtn">🚀 生成20组提示词</button>
</div>

<div class="result-wrap" id="resultWrap"></div>

<script>
let allPrompts=[];

const variants=[
"主营品类+国潮醒目标语","特色品类+东方潮酷标语","招牌品类+国潮吸睛标语",
"核心品类+潮流国风标语","爆款品类+国潮炸街标语","主营项目+东方潮玩标语",
"特色项目+国潮炫酷标语","招牌项目+潮流东方标语","核心项目+国潮新潮标语",
"爆款项目+东方潮范标语","主营服务+国潮个性标语","特色服务+潮流国风标语",
"招牌服务+国潮亮眼标语","核心服务+东方潮酷标语","爆款服务+国潮潮流标语",
"主营产品+潮流醒目标语","特色产品+国潮东方标语","招牌产品+潮玩国风标语",
"核心产品+国潮吸睛标语","爆款产品+东方新潮标语"
];

const fontVariants=[
"粗体国潮字体","毛笔书法字体","现代黑体","圆润潮流字体","金属立体字体","霓虹发光字体"
];

function createPrompt(industry){
  const time=document.getElementById("timeSelect").value;
  const shape=document.getElementById("shapeSelect").value;

  const variant=variants[Math.floor(Math.random()*variants.length)];
  const font=fontVariants[Math.floor(Math.random()*fontVariants.length)];

  const timeDesc=time==="夜晚"
  ? "夜晚效果，霓虹灯光，强光发光字，氛围灯反射"
  : "白天效果，自然光照，正面柔光，无反光";

  return `${timeDesc}，${shape}，店铺正立面完整展示，无任何遮挡，正面平视视角，无透视畸变，东方国潮风格，年轻潮流感，${industry}店铺门头，烤漆板、亚克力发光字、不锈钢包边、装饰灯带，品牌店名+${variant}，${font}，字体零错误、比例精准、笔画清晰可辨，8K高清，商业写实效果图，可直接施工参考`;
}

function generatePrompts(){
  const industry=document.getElementById("industryInput").value.trim();
  if(!industry){alert("请输入行业类型！");return;}

  const resultWrap=document.getElementById("resultWrap");
  resultWrap.innerHTML="";
  allPrompts=[];

  for(let i=0;i<20;i++){
    const prompt=createPrompt(industry);
    allPrompts.push(prompt);

    const div=document.createElement("div");
    div.className="result-item";

    div.innerHTML=`
      <div class="item-text">${i+1}. ${prompt}</div>
      <button class="copy-btn" data-index="${i}">复制</button>
    `;

    resultWrap.appendChild(div);
  }

  bindCopyButtons();

  resultWrap.innerHTML+=`
    <button class="copy-all-btn" onclick="copyAll()">📋 一键复制全部</button>
    <button class="download-btn" onclick="downloadTxt()">💾 下载TXT</button>
  `;
}

function bindCopyButtons(){
  document.querySelectorAll(".copy-btn").forEach(btn=>{
    btn.onclick=function(){
      const index=this.dataset.index;
      navigator.clipboard.writeText(allPrompts[index]).then(()=>{
        this.classList.add("copied");
        this.textContent="已复制";
        setTimeout(()=>{
          this.classList.remove("copied");
          this.textContent="复制";
        },2000);
      });
    };
  });
}

function copyAll(){
  navigator.clipboard.writeText(allPrompts.join("\n\n")).then(()=>{
    alert("已复制全部20组提示词");
  });
}

function downloadTxt(){
  const blob=new Blob([allPrompts.join("\n\n")],{type:"text/plain;charset=utf-8"});
  const link=document.createElement("a");
  link.href=URL.createObjectURL(blob);
  link.download="国潮风门头提示词.txt";
  link.click();
}

document.getElementById("genBtn").addEventListener("click",generatePrompts);
</script>

</body>
</html>
